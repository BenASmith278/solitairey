<!doctype html>
<html>
	<head>
		<style>
			.card {
				position: relative;
				width: 120px;
				height: 180px;
				border-radius: 12px;
				border: 2px solid black;
				overflow: hidden;
			}
			.card-back {
				position: absolute;
				inset: 0;
				width: 100%;
				height: 100%;
				border-radius: 12px;
				background: repeating-linear-gradient(
					45deg,
					#1565c0 0px,
					#1565c0 8px,
					#1976d2 8px,
					#1976d2 16px
				);
			}
		</style>
	</head>
	<body>
		<div class="card">
			<div class="card-back"></div>
		</div>
	</body>
</html>
